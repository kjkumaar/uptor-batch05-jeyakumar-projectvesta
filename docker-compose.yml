services:
  server-vesta:
    build: ./server-Vesta
    container_name: vesta-backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  ecommercetrainin:
    build: ./ecommercetrainin
    container_name: vesta-frontend
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: mongo
    container_name: vesta-db
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db

volumes:
  db-data: